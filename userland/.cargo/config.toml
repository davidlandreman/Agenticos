# Userland build configuration.
#
# We reuse the upstream `x86_64-unknown-none` target (already used by the
# kernel) rather than ship a custom JSON spec. `build-std` ensures `core` and
# `compiler_builtins` are compiled fresh against the bare-metal target;
# `compiler-builtins-mem` provides `memcpy`/`memset`/`memcmp` shims so we don't
# need to hand-roll them in the runtime crate.
#
# The linker is steered via per-binary `rustflags` in each app's Cargo.toml
# (see apps/hello/Cargo.toml) so the linker script and `-z` flags only apply
# to the final binary, not to dependency rlibs.

[build]
target = "x86_64-unknown-none"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
